# Mosquitto broker configuration for LADTS digital twin.
#
# Two listeners:
#   * 1883  — plain MQTT over TCP, used by the Python simulator.
#   * 9001  — MQTT over WebSocket, used by the browser dashboard.
#
# Anonymous access is allowed because this is a local development setup.
# For any production-like deployment add `password_file` and ACLs.

persistence false
log_dest stdout
log_type error
log_type warning
log_type notice

listener 1883 0.0.0.0
protocol mqtt
allow_anonymous true

listener 9001 0.0.0.0
protocol websockets
allow_anonymous true
